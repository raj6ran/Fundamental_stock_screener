name: Run Stock Screener

on:
  workflow_dispatch:
    inputs:
      sector:
        description: 'Single sector only (leave BLANK to run ALL 2366 stocks)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Single sector run (when sector input is given) ───────────
  screen-single:
    name: Screen single sector
    if: ${{ github.event.inputs.sector != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.30" "pandas>=2.0" "numpy>=1.24" requests lxml

      - name: Run single sector
        run: python screener.py --sector "${{ github.event.inputs.sector }}"

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html
          git diff --cached --quiet || git commit -m "Manual run: ${{ github.event.inputs.sector }} $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push

  # ── Full run: all sectors in parallel (when no sector given) ─
  screen-all-sectors:
    name: Screen ${{ matrix.sector }}
    if: ${{ github.event.inputs.sector == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        sector:
          - "Automobile and Auto Components"
          - "Capital Goods"
          - "Chemicals"
          - "Construction Materials"
          - "Consumer Durables"
          - "Consumer Services"
          - "Diversified"
          - "Fast Moving Consumer Goods"
          - "Fertilizers & Agrochemicals"
          - "Financial Services"
          - "Forest Materials"
          - "Healthcare"
          - "Information Technology"
          - "Media, Entertainment & Publication"
          - "Metals & Mining"
          - "Oil, Gas & Consumable Fuels"
          - "Real Estate"
          - "Retailing"
          - "Services"
          - "Telecommunication"
          - "Textiles"
          - "Utilities"
          - "NSE All Stocks"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.30" "pandas>=2.0" "numpy>=1.24" requests lxml

      - name: Screen sector
        run: |
          python screener.py \
            --sector "${{ matrix.sector }}" \
            --export-csv sector_data/
        timeout-minutes: 15

      - name: Upload sector CSV
        uses: actions/upload-artifact@v4
        with:
          name: sector-${{ matrix.sector }}
          path: sector_data/
          retention-days: 1

  combine-and-deploy:
    name: Combine & Deploy
    runs-on: ubuntu-latest
    needs: screen-all-sectors
    if: ${{ github.event.inputs.sector == '' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.30" "pandas>=2.0" "numpy>=1.24" requests lxml

      - name: Download all sector CSVs
        uses: actions/download-artifact@v4
        with:
          path: sector_data/
          merge-multiple: true

      - name: Combine into report.html
        run: python screener.py --combine sector_data/

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html
          git diff --cached --quiet || git commit -m "Manual full run $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push
