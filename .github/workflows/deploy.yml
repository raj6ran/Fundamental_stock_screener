name: Generate & Deploy Report

on:
  schedule:
    # Runs daily at 13:30 UTC (7:00 PM IST) — after NSE market close
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # Manual trigger from Actions tab

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Phase 1: Build sector list ──────────────────────────────
  matrix-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sectors: ${{ steps.sectors.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get sector list
        id: sectors
        run: |
          matrix=$(python -c "
          import json
          from config import NSE_SECTORS
          print(json.dumps(list(NSE_SECTORS.keys())))
          ")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ── Phase 2: Screen each sector in parallel ─────────────────
  screen:
    needs: matrix-setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        sector: ${{ fromJson(needs.matrix-setup.outputs.sectors) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Screen sector — ${{ matrix.sector }}
        run: python screener.py --sector "${{ matrix.sector }}" --export-csv sector_data --slow

      - name: Upload sector CSV
        uses: actions/upload-artifact@v4
        with:
          name: sector-${{ strategy.job-index }}
          path: sector_data/
          retention-days: 1

  # ── Phase 3: Combine results and generate HTML report ───────
  build:
    needs: screen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all sector data
        uses: actions/download-artifact@v4
        with:
          pattern: sector-*
          path: sector_data/
          merge-multiple: true

      - name: Combine and generate report
        run: python screener.py --combine sector_data/

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp report.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── Phase 4: Deploy to GitHub Pages ─────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
