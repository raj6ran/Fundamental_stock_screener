name: Generate & Deploy Report

on:
  schedule:
    - cron: '30 15 * * *'   # 9:00 PM IST daily  (15:30 UTC = 21:00 IST)
  workflow_dispatch:         # Manual "Run workflow" button in Actions tab

permissions:
  contents: write            # needed to push report.html back to repo
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes Node.js 20 deprecation warning

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4          # was v3 → fixed

      # ── 2. Python setup ────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5      # was v4 → fixed
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance>=0.2.30 pandas>=2.0 numpy>=1.24 requests lxml

      # ── 4. Run screener ────────────────────────────────────────
      - name: Run stock screener
        run: python screener.py --slow
        timeout-minutes: 55              # prevents hung jobs killing free minutes

      # ── 5. Commit report.html back to repo ────────────────────
      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html screener_run.log || true
          git diff --cached --quiet || git commit -m "Auto report $(date +'%Y-%m-%d %H:%M IST' --date='TZ=\"Asia/Kolkata\" now')"
          git push
