name: Generate & Deploy Report

on:
  schedule:
    - cron: '30 15 * * *'    # 9:00 PM IST every day
  workflow_dispatch:          # Manual "Run workflow" button

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────
# STRATEGY: Run all 22 sectors IN PARALLEL (matrix jobs).
#   Each sector finishes in ~3-5 min instead of the whole run
#   taking 55+ min sequentially.  Then one final job combines
#   all sector CSVs into a single report.html and deploys.
# ─────────────────────────────────────────────────────────────────

jobs:

  # ── JOB 1: Run each sector in parallel ──────────────────────
  screen-sector:
    name: Screen ${{ matrix.sector }}
    runs-on: ubuntu-latest
    timeout-minutes: 20        # plenty for one sector

    strategy:
      fail-fast: false         # if one sector fails, others keep running
      matrix:
        sector:
          - "Automobile and Auto Components"
          - "Capital Goods"
          - "Chemicals"
          - "Construction Materials"
          - "Consumer Durables"
          - "Consumer Services"
          - "Diversified"
          - "Fast Moving Consumer Goods"
          - "Fertilizers & Agrochemicals"
          - "Financial Services"
          - "Forest Materials"
          - "Healthcare"
          - "Information Technology"
          - "Media, Entertainment & Publication"
          - "Metals & Mining"
          - "Oil, Gas & Consumable Fuels"
          - "Real Estate"
          - "Retailing"
          - "Services"
          - "Telecommunication"
          - "Textiles"
          - "Utilities"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.30" "pandas>=2.0" "numpy>=1.24" requests lxml

      - name: Screen sector
        run: |
          python screener.py \
            --sector "${{ matrix.sector }}" \
            --export-csv sector_data/
        timeout-minutes: 15

      - name: Upload sector CSV
        uses: actions/upload-artifact@v4
        with:
          name: sector-${{ matrix.sector }}
          path: sector_data/
          retention-days: 1    # temp — only needed for the combine step

  # ── JOB 2: Combine all CSVs → report.html → deploy ──────────
  combine-and-deploy:
    name: Combine & Deploy
    runs-on: ubuntu-latest
    needs: screen-sector        # waits for ALL 22 sectors to finish
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.30" "pandas>=2.0" "numpy>=1.24" requests lxml

      - name: Download all sector CSVs
        uses: actions/download-artifact@v4
        with:
          path: sector_data/
          merge-multiple: true   # all artifacts merged into one folder

      - name: Combine CSVs into report.html
        run: python screener.py --combine sector_data/

      - name: Commit report.html to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html
          git diff --cached --quiet || git commit -m "Auto report $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push
